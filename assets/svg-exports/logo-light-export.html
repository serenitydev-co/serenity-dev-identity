<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Serenity Dev Logo Light</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; background: transparent; }
      .artboard { width: 1400px; height: 700px; background: #f3f1ee; display:flex; align-items:center; justify-content:center; }
      .lockup { display:flex; align-items:center; gap:28px; }
      .lockup img { width: 250px; height: 250px; }
      .wordmark { font-family: "Russo One", sans-serif; font-size: 120px; line-height: 1; color: #1f2933; }
    </style>
  </head>
  <body>
    <div class="artboard">
      <div class="lockup">
        <img src="../serenity-dev-symbol.svg" alt="" />
        <div class="wordmark">Serenity Dev</div>
      </div>
    </div>
  </body>
</html>
